            display: flex;

            padding: 15px;

            border-radius: 8px;
            width: fit-content;
            margin: 0 auto;
        }

            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: none !important;
        }

            padding: 15px;
            border-radius: 8px;

<body>

<div class="container">
    <h2>🔒 QR Link Locker By Ryzzi</h2>
    <p class="desc">
        Buat link menjadi QR code yang terenkripsi dan aman.
    </p>

    <div class="section">
        <h3>buat link jadi qr kunci</h3>
        <input type="url" id="link-input" placeholder="Masukkan link (contoh: https://google.com)">
        <button onclick="generateSecureQR()">Generate QR</button>
        
        <div id="qrcode-wrapper" style="display:none;">
            <div id="qrcode"></div>
            <p style="color:#22c55e; text-align:center; font-size:12px; margin-top:10px; margin-bottom:5px;">✓ QR Berhasil Terenkripsi!</p>
            <button class="btn-download" onclick="downloadQR()">📥 Download Gambar QR</button>
        </div>
    </div>

    <div class="section">
        <h3>Scan Qr kunci untuk Buka Link</h3>
        <div id="reader"></div>
        <div id="status" class="status-box"></div>
    </div>
</div>

<script>
    // Kunci enkripsi agar tidak terbaca Google
    const KEY_PREFIX = "SECURE_GATEWAY_BYPASS:";

    // 1. FUNGSI MEMBUAT QR SECURE
    function generateSecureQR() {
        const linkInput = document.getElementById("link-input").value.trim();
        const qrWrapper = document.getElementById("qrcode-wrapper");
        const qrContainer = document.getElementById("qrcode");
        
        if (!linkInput) {
            alert("Silakan masukkan link terlebih dahulu!");
            return;
        }

        if (!linkInput.startsWith("http://") && !linkInput.startsWith("https://")) {
            alert("Harus memasukkan URL lengkap dengan http:// atau https://");
            return;
        }
        
        qrContainer.innerHTML = ""; 
        qrWrapper.style.display = "block";
        
        const encryptedLink = KEY_PREFIX + btoa(linkInput);

        new QRCode(qrContainer, {
            text: encryptedLink,
            width: 180,
            height: 180,
            colorDark : "#0f172a",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    // 2. FUNGSI DOWNLOAD QR CODE
    function downloadQR() {
        const qrImage = document.querySelector("#qrcode img");
        if (qrImage) {
            const imageSrc = qrImage.src;
            const downloadLink = document.createElement("a");
            downloadLink.href = imageSrc;
            downloadLink.download = "Ryzx_QR_Code.png";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        } else {
            const qrCanvas = document.querySelector("#qrcode canvas");
            if (qrCanvas) {
                const imageSrc = qrCanvas.toDataURL("image/png");
                const downloadLink = document.createElement("a");
                downloadLink.href = imageSrc;
                downloadLink.download = "Ryzx_QR_Code.png";
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            } else {
                alert("Gagal mengunduh, silakan coba generate ulang.");
            }
        }
    }

    // 3. FUNGSI SCANNER & AUTO REDIRECT
    function onScanSuccess(decodedText, decodedResult) {
        const statusBox = document.getElementById("status");
        statusBox.style.display = "block";

        if (decodedText.startsWith(KEY_PREFIX)) {
            statusBox.style.background = "#16a34a";
            statusBox.style.color = "#ffffff";
            statusBox.innerHTML = "🔄 Kode Valid! Mengalihkan ke halaman tujuan...";

            const base64Data = decodedText.replace(KEY_PREFIX, "");
            
            try {
                const originalLink = atob(base64Data);
                html5QrcodeScanner.clear();
                
                setTimeout(() => {
                    window.location.href = originalLink;
                }, 1500);

            } catch (e) {
                statusBox.style.background = "#dc2626";
                statusBox.innerHTML = "❌ Gagal memproses link. Kode rusak.";
            }
        } else {
            statusBox.style.background = "#ea580c";
            statusBox.style.color = "#ffffff";
            statusBox.innerHTML = "⚠️ Ini QR Code biasa/tidak dikenal. Sistem menolak akses.";
        }
    }

    function onScanFailure(error) {
        // Abaikan error realtime
    }

    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", { fps: 10, qrbox: 220 }, false);
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);

    // INJEKSI SERVICE WORKER IN-LINE (Tanpa File sw.js Terpisah)
    if ('serviceWorker' in navigator) {
        const swCode = `
            const CACHE_NAME = 'qr-locker-v2';
            self.addEventListener('install', (e) => {
                e.waitUntil(caches.open(CACHE_NAME).then((c) => c.addAll(['.'])));
            });
            self.addEventListener('fetch', (e) => {
                e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request)));
            });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        
        window.addEventListener('load', () => {
            navigator.serviceWorker.register(swUrl, { scope: './' })
                .then(reg => console.log('PWA Service Worker Aktif!'))
                .catch(err => console.log('PWA Gagal:', err));
        });
    }
</script>
